services:

  postgres:
    image: postgres:16-alpine
    container_name: price-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-price_tracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-price_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Tracker — API web para scraping y resumen ─────────────
  tracker:
    build:
      context: .
      dockerfile: docker/tracker/Dockerfile
    container_name: price-tracker-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-price_tracker}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TELEGRAM_TOKEN:    ${TELEGRAM_TOKEN}
      TELEGRAM_CHAT_ID:  ${TELEGRAM_CHAT_ID}
    ports:
      - "8000:8000"

  summary:
    build:
      context: .
      dockerfile: docker/tracker/Dockerfile
    container_name: price-tracker-summary
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-price_tracker}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TELEGRAM_TOKEN:    ${TELEGRAM_TOKEN}
      TELEGRAM_CHAT_ID:  ${TELEGRAM_CHAT_ID}
    command: ["python", "tracker.py", "--summary"]
    profiles:
      - tools  # no arranca con `docker compose up`, solo con `docker compose run`

volumes:
  postgres_data: